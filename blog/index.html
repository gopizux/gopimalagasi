<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="1fR54c0KktduXTOmcvV4cOz12C84D8WBvkkA9BQd6-Y" />
    <title>Blog — Gopi Malagasi</title>
    <meta name="description" content="Thoughts on programming, security, and technology" />
    <meta name="author" content="Gopi Malagasi" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: thin;
            transition: background 0.35s ease, color 0.35s ease;
        }

        :root {
            --bg: #0a0a0a;
            --bg-soft: #111;
            --bg-border: #222;
            --text: #e0e0e0;
            --text-muted: #666;
            --text-dim: #444;
            --link-hover: #ff4d00;
        }

        [data-theme="light"] {
            --bg: #f5f3f0;
            --bg-soft: #edeae6;
            --bg-border: #d5d0ca;
            --text: #1a1a1a;
            --text-muted: #555;
            --text-dim: #888;
            --link-hover: #cc3d00;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--bg-border);
        }

        header a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        header a:hover {
            color: var(--link-hover);
        }

        .back-link {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .theme-toggle:hover {
            color: var(--link-hover);
        }

        .blog-header {
            margin-bottom: 50px;
        }

        .blog-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .blog-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.8;
        }

        .blog-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .blog-post {
            padding: 24px 0;
            border-bottom: 1px solid var(--bg-border);
            transition: padding 0.2s ease;
        }

        .blog-post:first-child {
            border-top: 1px solid var(--bg-border);
        }

        .blog-post:hover {
            padding-left: 8px;
        }

        .blog-date {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .blog-post h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .blog-post a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .blog-post a:hover {
            color: var(--link-hover);
        }

        footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid var(--bg-border);
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
        }

        @media (max-width: 640px) {
            .blog-title {
                font-size: 2rem;
            }

            .blog-post h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/gopimalagasi/" class="back-link">← Back Home</a>
            <button class="theme-toggle" aria-label="Toggle theme" id="themeToggle">
                <span>🌙</span>
            </button>
        </header>

        <main>
            <div class="blog-header">
                <h1 class="blog-title">Blog</h1>
                <p class="blog-subtitle">Thoughts on programming, security, and technology.</p>
            </div>

            <div class="blog-list">
                <article class="blog-post">
                    <p class="blog-date">July 20, 2026</p>
                    <h2>
                        <a href="/gopimalagasi/blog/posts/first-post/">Getting Started with Security Research</a>
                    </h2>
                </article>

                <article class="blog-post">
                    <p class="blog-date">July 15, 2026</p>
                    <h2>
                        <a href="/gopimalagasi/blog/posts/web-security/">Web Security Fundamentals</a>
                    </h2>
                </article>

                <article class="blog-post">
                    <p class="blog-date">July 10, 2026</p>
                    <h2>
                        <a href="/gopimalagasi/blog/posts/coding-tips/">Best Practices in Modern Development</a>
                    </h2>
                </article>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Gopi Malagasi. All rights reserved.</p>
        </footer>
    </div>

    <script>
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';

        html.setAttribute('data-theme', currentTheme);

        themeToggle.addEventListener('click', () => {
            const theme = html.getAttribute('data-theme');
            const nextTheme = theme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
            themeToggle.textContent = nextTheme === 'light' ? '🌙' : '☀️';
        });

        if (currentTheme === 'light') {
            themeToggle.textContent = '☀️';
        }
    </script>
</body>
</html>
